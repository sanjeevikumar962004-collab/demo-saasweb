<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly - 404 Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAF9F6;
            --dark: #0a0a0a;
            --text-dark: #111111;
            --text-light: #ffffff;
            --gray: #666666;
            --font: 'Inter', -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font);
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .error-code {
            font-size: 15vw;
            font-weight: 600;
            letter-spacing: -0.05em;
            line-height: 1;
            color: var(--dark);
            opacity: 0.05;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 600px;
            padding: 0 20px;
        }

        .content h1 {
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .content p {
            font-size: 18px;
            color: var(--gray);
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .btn-black {
            background: var(--text-dark); 
            color: var(--text-light);
            padding: 16px 32px; 
            border-radius: 100px;
            font-size: 15px; 
            font-weight: 500; 
            text-decoration: none;
            transition: transform 0.2s, background 0.2s; 
            display: inline-block;
        }

        .btn-black:hover { 
            background: #222;
            transform: translateY(-2px); 
        }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <div class="content">
        <h1>Page not found</h1>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="index.html" class="btn-black">Return to Home</a>
    </div>
</body>
</html>
